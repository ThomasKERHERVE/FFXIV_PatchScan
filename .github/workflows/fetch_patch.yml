name: Fetch Latest Patch Notes

on:
  schedule:
    - cron: '0 10 * * 2'  # Every Tuesday at 10:00 UTC (FFXIV patches on Tuesdays)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Run fetch script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_patch.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "chore: add latest patch notes"
          git pull --rebase
          git push